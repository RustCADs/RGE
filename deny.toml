# cargo-deny configuration — workspace dependency governance
# Wired into CI as part of Phase 0.2 architecture enforcement (per IMPLEMENTATION.md).

[graph]
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "wasm32-unknown-unknown" },
]
all-features          = false
no-default-features   = false

[advisories]
db-path  = "~/.cargo/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]
ignore   = []

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-git        = []
