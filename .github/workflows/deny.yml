name: Supply chain (cargo-deny)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-run weekly so newly published RustSec advisories surface even
    # without a workspace change.
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  deny:
    name: cargo deny check (${{ matrix.checks }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # Run each check independently so the PR shows which dimension failed.
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans
          - licenses
          - sources
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          # Uses A:/RCAD/RGE/deny.toml in the repo root.
