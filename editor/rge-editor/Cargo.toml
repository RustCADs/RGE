[package]
name        = "rge-editor"
description = "RGE editor host application"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
publish                = false

[[bin]]
name = "rge-editor"
path = "src/main.rs"

[dependencies]
# Sub-Î´.1.B: real winit binary that opens a window and renders one cuboid.
# Constructs a CadGraph + CadProjection + World, spawns a single Cuboid
# entity, hands them to EditorShell::with_world_projection_graph and runs
# the winit event loop. No mouse interaction / picking / selection (sub-Î´.2).
rge-editor-shell    = { path = "../../crates/editor-shell" }
rge-cad-core        = { path = "../../crates/cad-core" }
rge-cad-projection  = { path = "../../crates/cad-projection" }
rge-kernel-ecs      = { path = "../../kernel/ecs" }
# Dispatch G â€” `--glb <path>` render-only mesh ingestion. Editor-tier
# binary depending on game-domain crates (`rge-io-*`, `rge-brep-*`) is
# permitted; `forbidden-dep` rule 6 only blocks RENDERER_CRATES â†’
# game-domain. `rge-editor` is not a renderer crate.
rge-io-gltf         = { path = "../../crates/io-gltf" }
rge-brep-render     = { path = "../../crates/brep-render" }
# `--scene <path>` load-only path. `rge-scene-loader` owns the
# `.rge-project` / `.rge-scene` path resolver (`load_scene_world_from_path`)
# â€” file read + RON parse + `Scene -> World` bridge â€” so the editor only
# invokes it. The former direct `rge-data` / `ron` deps moved into
# `rge-scene-loader` with the resolver (SCENE-WORLD-BRIDGE dispatch).
rge-scene-loader    = { path = "../../crates/rge-scene-loader" }
# Dispatch J â€” CPU-bake accumulated glTF TRS before `RenderMesh::from_buffers`
# so imported meshes render at their world-space pose, not at the origin.
# Editor-tier binary; glam dep is unrelated to `forbidden-dep` rule 6.
glam                = "0.30"
winit               = { workspace = true }
tracing             = { workspace = true }
tracing-subscriber  = { workspace = true }
# ISSUE-85 â€” notify-backed GLB hot-reload watcher. Used only when
# `--glb <path>` is active; reuses the existing workspace `notify`
# version pinned at `crates/editor-ui` and `crates/ui-theme` so no
# new workspace dep version is introduced.
notify              = { workspace = true }
# ISSUE-258 â€” native "Open GLB" file dialog (Ctrl+O). `rge-editor`-only
# dep; editor-shell stays free of `rfd` (it exposes only the
# `GlbOpenDialog` trait, which this binary impls with rfd). UI
# affordance, not architecture-bearing â€” `versions.md` row, no ADR.
rfd                 = { workspace = true }

[dev-dependencies]
# Dispatch N2 â€” enable editor-shell's `test-harness` feature for
# `cargo test -p rge-editor` only. Production `cargo build` uses the
# regular dep without the feature, keeping the bin's compile unit
# free of visual-test-harness symbols. Cargo unifies the regular dep
# + dev-dep entries during test compilation; the harness module
# becomes visible to the `#[cfg(test)] mod tests` block where the
# end-to-end GLB tests live.
rge-editor-shell = { path = "../../crates/editor-shell", features = ["test-harness"] }
# rge-gfx + wgpu are transitively present via editor-shell at all
# times, but the dispatch-N2 tests in main.rs name `rge_gfx::
# ReadbackBuffer` and `wgpu::TextureFormat` directly. Adding them as
# dev-deps surfaces those names in the test compile unit without
# affecting the bin's regular dep tree.
rge-gfx          = { path = "../../crates/gfx" }
wgpu             = { workspace = true }

[lints]
workspace = true
